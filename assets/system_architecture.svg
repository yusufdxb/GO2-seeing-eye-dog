<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #10243e; }
      .label { font: 600 18px Arial, sans-serif; fill: #10243e; }
      .small { font: 500 14px Arial, sans-serif; fill: #2f4b66; }
      .box { rx: 18; ry: 18; stroke-width: 3; }
      .flow { stroke: #345d7e; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .sensor { fill: #e6f4ff; stroke: #5c8db8; }
      .compute { fill: #f5efe0; stroke: #b58a3a; }
      .control { fill: #e9f7ef; stroke: #4a8f67; }
      .safety { fill: #fff0f0; stroke: #ba5b5b; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#345d7e"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#fbfcfe"/>
  <text x="60" y="60" class="title">GO2 Seeing-Eye Dog: Public System Architecture</text>
  <text x="60" y="95" class="small">Current repo scope: implemented packages and data flow. End-to-end performance evaluation is documented separately.</text>

  <rect x="60" y="150" width="220" height="90" class="box sensor"/>
  <text x="90" y="190" class="label">Microphone Array</text>
  <text x="90" y="218" class="small">voice commands, sound direction</text>

  <rect x="60" y="280" width="220" height="90" class="box sensor"/>
  <text x="90" y="320" class="label">RGB-D Camera</text>
  <text x="90" y="348" class="small">person detection, tracking, depth</text>

  <rect x="60" y="410" width="220" height="90" class="box sensor"/>
  <text x="90" y="450" class="label">LiDAR + Proximity</text>
  <text x="90" y="478" class="small">navigation and obstacle cues</text>

  <rect x="360" y="150" width="260" height="90" class="box compute"/>
  <text x="390" y="190" class="label">go2_audio_perception</text>
  <text x="390" y="218" class="small">speech capture, localization, filtering</text>

  <rect x="360" y="280" width="260" height="90" class="box compute"/>
  <text x="390" y="320" class="label">go2_perception</text>
  <text x="390" y="348" class="small">human detection, ID cues, target state</text>

  <rect x="360" y="410" width="260" height="90" class="box safety"/>
  <text x="390" y="450" class="label">go2_safety_monitor</text>
  <text x="390" y="478" class="small">hazard checks, stop conditions, gating</text>

  <rect x="700" y="215" width="280" height="110" class="box compute"/>
  <text x="735" y="258" class="label">go2_intent_grounding</text>
  <text x="735" y="286" class="small">multimodal confirmation of user + command</text>
  <text x="735" y="308" class="small">publishes confirmed target + behavior intent</text>

  <rect x="700" y="380" width="280" height="100" class="box control"/>
  <text x="735" y="422" class="label">go2_navigation + bringup</text>
  <text x="735" y="450" class="small">Nav2 config, behavior routing, launch</text>

  <rect x="1040" y="270" width="180" height="120" class="box control"/>
  <text x="1073" y="315" class="label">GO2 Locomotion</text>
  <text x="1070" y="343" class="small">gait control</text>
  <text x="1066" y="365" class="small">motion execution</text>

  <path d="M280 195 L360 195" class="flow"/>
  <path d="M280 325 L360 325" class="flow"/>
  <path d="M280 455 L360 455" class="flow"/>
  <path d="M620 195 L700 250" class="flow"/>
  <path d="M620 325 L700 270" class="flow"/>
  <path d="M620 455 L700 430" class="flow"/>
  <path d="M980 270 L1040 320" class="flow"/>
  <path d="M980 430 L1040 340" class="flow"/>

  <rect x="60" y="560" width="1160" height="100" fill="#f1f5f9" stroke="#c7d3df" rx="18" ry="18"/>
  <text x="90" y="598" class="label">Evaluation focus</text>
  <text x="90" y="626" class="small">Measure follow distance error, reacquisition success after occlusion, command-to-action latency, and safety-triggered stop behavior.</text>
</svg>
