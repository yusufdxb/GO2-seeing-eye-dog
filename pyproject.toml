[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
  "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"*/test/*.py" = ["E402"]
"evaluation/tests/*.py" = ["E402"]

[tool.pytest.ini_options]
addopts = "-q -p no:cacheprovider"
testpaths = [
  "go2_audio_perception/test",
  "go2_intent_grounding/test",
  "go2_voice_commander/test",
  "evaluation/tests",
]

