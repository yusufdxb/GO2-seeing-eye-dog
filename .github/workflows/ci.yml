name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - name: Lint Python sources
        run: |
          ruff check \
            go2_audio_perception/ \
            go2_perception/ \
            go2_intent_grounding/ \
            go2_safety_monitor/ \
            go2_voice_commander/ \
            go2_navigation/ \
            evaluation/ \
            --select E,F,W,I --ignore E501,E402 \
            --exclude "**/__pycache__"

  structure:
    name: Package structure check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify required packages exist
        run: |
          for pkg in go2_audio_perception go2_perception go2_intent_grounding \
                     go2_safety_monitor go2_voice_commander go2_navigation go2_msgs; do
            [ -f "$pkg/package.xml" ] || { echo "MISSING package.xml in $pkg"; exit 1; }
            echo "OK: $pkg"
          done

  test:
    name: Unit tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install numpy scipy pytest
      - name: Run unit tests
        run: |
          python3 -m pytest \
            go2_audio_perception/test/ \
            go2_intent_grounding/test/ \
            evaluation/tests/ \
            -v -p no:cacheprovider

  build:
    name: Build (ROS 2 Jazzy)
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy-ros-base
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          . /opt/ros/jazzy/setup.sh
          apt-get update -q
          apt-get install -y \
            python3-colcon-common-extensions \
            python3-pip \
            python3-rosdep \
            portaudio19-dev
          rosdep init || true
          rosdep update
          rosdep install --from-paths . --ignore-src -r -y --rosdistro jazzy
          pip install ultralytics opencv-python-headless pyaudio scipy numpy
      - name: Build msgs first, then packages
        run: |
          . /opt/ros/jazzy/setup.sh
          colcon build --symlink-install --packages-select go2_msgs
          . install/setup.sh
          colcon build --symlink-install --packages-select \
            go2_audio_perception go2_perception go2_intent_grounding \
            go2_safety_monitor go2_voice_commander go2_navigation \
            go2_bringup go2_gait_controller
