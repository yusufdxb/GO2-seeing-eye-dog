name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install numpy scipy pytest ruff
      - name: Lint repo
        run: ./scripts/lint.sh

  validate:
    name: Static validation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install numpy scipy pytest ruff
      - name: Validate repo contracts
        run: ./scripts/validate.sh

  test:
    name: Unit tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install numpy scipy pytest
      - name: Run unit tests
        run: ./scripts/test.sh

  build:
    name: Build (ROS 2 Humble)
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          . /opt/ros/humble/setup.sh
          apt-get update -q
          apt-get install -y \
            python3-colcon-common-extensions \
            python3-pip \
            python3-rosdep \
            portaudio19-dev
          rosdep init || true
          rosdep update
          rosdep install --from-paths . --ignore-src -r -y --rosdistro humble
          pip install ultralytics opencv-python-headless pyaudio scipy numpy
      - name: Build msgs first, then packages
        run: |
          . /opt/ros/humble/setup.sh
          colcon build --symlink-install --packages-select go2_msgs
          . install/setup.sh
          colcon build --symlink-install --packages-select \
            go2_audio_perception go2_perception go2_intent_grounding \
            go2_safety_monitor go2_voice_commander go2_navigation \
            go2_bringup go2_gait_controller
